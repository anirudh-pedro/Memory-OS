services:
  neo4j:
    image: neo4j:5.24-community
    container_name: memory-os-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - ${MEMORY_OS_NEO4J_PATH:-./.neo4j_data}:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: memory-os-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - ${MEMORY_OS_QDRANT_PATH:-./.qdrant_data}:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
