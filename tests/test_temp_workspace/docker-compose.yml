services:
  neo4j:
    image: neo4j:5
    container_name: memory-os-neo4j-default
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/memory_neo
    volumes:
      - "C:/Users/HP/Desktop/machine learning/Memory-os/tests/test_temp_workspace/workspaces/default/neo4j:/data"
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: memory-os-qdrant-default
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - "C:/Users/HP/Desktop/machine learning/Memory-os/tests/test_temp_workspace/workspaces/default/qdrant:/qdrant/storage"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
